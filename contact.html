<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Royal Hotel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/contact.css">
</head>
<body>

    <main class="contact-wrapper">
        <div class="container-fluid p-0">
            <div class="row g-0 min-vh-100">
                
                <div class="col-lg-5 d-none d-lg-flex align-items-center justify-content-center p-5 contact-info-side">
                    <div class="content-overlay"></div>
                    <div class="info-content text-white position-relative">
                        <h1 class="display-2 fw-bold mb-4">Get In <br><span class="text-gold">Touch</span></h1>
                        <p class="lead mb-5 opacity-75">نحن هنا لخدمتك. تواصل معنا لتجربة ملكية لا تُنسى في قلب الفخامة.</p>
                        
                        <div class="contact-details">
                            <div class="detail-item d-flex mb-4">
                                <div class="icon-circle me-3"><i class="fas fa-map-marker-alt"></i></div>
                                <div>
                                    <h5 class="mb-1 text-gold">Location</h5>
                                    <p class="mb-0">123 Royal St, Cairo, Egypt</p>
                                </div>
                            </div>
                            <div class="detail-item d-flex mb-4">
                                <div class="icon-circle me-3"><i class="fas fa-phone-alt"></i></div>
                                <div>
                                    <h5 class="mb-1 text-gold">Reception</h5>
                                    <p class="mb-0">+20 123 456 7890</p>
                                </div>
                            </div>
                        </div>

                        <div class="social-links mt-5">
                            <a href="#" class="me-3 text-white fs-4"><i class="fab fa-facebook"></i></a>
                            <a href="#" class="me-3 text-white fs-4"><i class="fab fa-instagram"></i></a>
                            <a href="#" class="text-white fs-4"><i class="fab fa-linkedin"></i></a>
                        </div>
                    </div>
                </div>

                <div class="col-lg-7 d-flex align-items-center bg-dark-royal p-4 p-md-5">
                    <div class="w-100 mx-auto" style="max-width: 650px;">
                        <div class="form-header mb-5">
                            <h2 class="text-white fw-bold">Send Us a Message</h2>
                            <div class="title-line"></div>
                        </div>

                        <form id="contactForm" class="row g-4">
                            <div class="col-md-6">
                                <input type="text" class="form-control royal-input" placeholder="Full Name" required>
                            </div>
                            <div class="col-md-6">
                                <input type="email" class="form-control royal-input" placeholder="Email Address" required>
                            </div>
                            <div class="col-12">
                                <input type="text" class="form-control royal-input" placeholder="Subject">
                            </div>
                            <div class="col-12">
                                <textarea class="form-control royal-input" rows="5" placeholder="Your Message..." required></textarea>
                            </div>
                            <div class="col-12 mt-4">
                                <button type="submit" class="btn btn-gold-action w-100 py-3 fw-bold">
                                    SEND MESSAGE <i class="fas fa-paper-plane ms-2"></i>
                                </button>
                            </div>
                        </form>

                        <div class="mini-map mt-5">
                            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3453.158301548816!2d31.2335!3d30.0444!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzDCsDAyJzQwLjAiTiAzMcKwMTQnMDAuMCJF!5e0!3m2!1sen!2seg!4v1690000000000" 
                                width="100%" height="150" style="border:0; border-radius: 15px; opacity: 0.6; filter: grayscale(1);" allowfullscreen="" loading="lazy"></iframe>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/contact.js"></script>
</body>
</html>
